<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
// DYNAMIC RESOLUTION SCALING — GPU tier detection
// ═══════════════════════════════════════════════════════════════
function detectTier() {
  const c = document.createElement('canvas');
  const gl = c.getContext('webgl2') || c.getContext('webgl');
  if (!gl) return 'fallback';
  const dbg = gl.getExtension('WEBGL_debug_renderer_info');
  const gpu = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : '';
  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  // Tier detection heuristics
  if (isMobile && !/Apple/i.test(gpu)) return 'low'; // mobile non-Apple
  if (/Mali|Adreno [0-4]/i.test(gpu)) return 'low';
  if (/Apple/i.test(gpu) && isMobile) return 'mid'; // iPhone/iPad
  if (/Apple/i.test(gpu)) return 'high'; // Apple Silicon Mac
  if (/GTX 10[56]|GTX 16|RTX 20|RX 5[67]|Intel/i.test(gpu)) return 'mid';
  return 'high'; // RTX 30+, RX 6+, etc.
}

const tier = detectTier();
// PRD spec: High 2M, Mid 1M, Low 500K → sqrt(2M)≈1414, sqrt(1M)=1024, sqrt(500K)≈724
// Low-end devices get video-loop fallback per PRD.md:9
const TEX_SIZES = { high: 1414, mid: 1024, low: 724, fallback: 0 };
const TEX = TEX_SIZES[tier] || 724;
const COUNT = TEX * TEX;
const CYCLE = 20.0;

document.getElementById('ui-tier').textContent = tier.toUpperCase();
document.getElementById('ui-particles').textContent = COUNT >= 1e6
  ? (COUNT / 1e6).toFixed(1) + 'M'
  : (COUNT / 1e3 | 0) + 'K';

// Low-end fallback: attempt video loop first, fall through to gradient if video fails
function activateVideoFallback(reason) {
  const vid = document.getElementById('fallback-video');
  vid.src = 'https://cdn.feralfile.com/unsupervised-loop.mp4';
  vid.muted = true; vid.loop = true; vid.playsInline = true;
  vid.style.display = 'block';
  vid.play().catch(() => {
    vid.style.display = 'none';
    document.getElementById('loader').innerHTML =
      '<div style="text-align:center"><div style="font-size:22px;letter-spacing:.2em;margin-bottom:16px">UNSUPERVISED</div>' +
      '<div style="opacity:.5;font-size:10px">' + reason + '</div></div>';
    document.getElementById('loader').style.background =
      'radial-gradient(ellipse at center, #1a0a2e 0%, #000 70%)';
  });
  document.getElementById('loader').classList.add('hidden');
}

// For no-WebGL devices: video fallback
if (tier === 'fallback') {
  activateVideoFallback('WebGL 2.0 required for real-time rendering.<br>Please use a modern desktop browser.');
  throw new Error('No WebGL — video fallback shown');
}
// PRD §2: low-end devices use video-loop fallback instead of rendering 500K particles
if (tier === 'low') {
  activateVideoFallback('Low-end GPU detected.<br>Showing pre-rendered visualization.');
  throw new Error('Low tier — video fallback shown');
}

// ═══════════════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 4.8);

// Mouse (uses live innerWidth/Height for correct normalization after resize)
const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
document.addEventListener('mousemove', e => {
  mouse.tx = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.ty = (e.clientY / window.innerHeight - 0.5) * 2;
});
document.getElementById('ui-res').textContent = window.innerWidth + '×' + window.innerHeight;
// Block zoom/drag/scroll — PRD §5
document.addEventListener('wheel', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());

// ═══════════════════════════════════════════════════════════════
// GLSL: Simplex 3D Noise + Curl Noise
// ═══════════════════════════════════════════════════════════════
const NOISE = /* glsl */`
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod(i,289.0);
  vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=1./7.;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
vec3 curlNoise(vec3 p){
  float e=0.01;
  vec3 s2=vec3(31.416,47.853,12.793),s3=vec3(113.758,23.479,67.214);
  float a=snoise(p+s3+vec3(0,e,0))-snoise(p+s3-vec3(0,e,0));
  float b=snoise(p+s2+vec3(0,0,e))-snoise(p+s2-vec3(0,0,e));
  float c=snoise(p+vec3(0,0,e))-snoise(p-vec3(0,0,e));
  float d=snoise(p+s3+vec3(e,0,0))-snoise(p+s3-vec3(e,0,0));
  float f=snoise(p+s2+vec3(e,0,0))-snoise(p+s2-vec3(e,0,0));
  float g=snoise(p+vec3(0,e,0))-snoise(p-vec3(0,e,0));
  return vec3(a-b,c-d,f-g)/(2.0*e);
}
`;

// ═══════════════════════════════════════════════════════════════
// GPGPU VELOCITY SHADER — Curl Noise + Tendril Formation
// ═══════════════════════════════════════════════════════════════
const velShader = /* glsl */`
${NOISE}
uniform float uTime;
uniform float uBreath;
void main(){
  vec2 uv=gl_FragCoord.xy/resolution.xy;
  vec4 p4=texture2D(texturePosition,uv);
  vec4 v4=texture2D(textureVelocity,uv);
  vec3 p=p4.xyz, v=v4.xyz;
  float phase=p4.w;

  // === TENDRIL FORMATION ===
  // Multi-octave curl noise for filament-like strands
  float ns1=1.0+0.3*uBreath;
  float ns2=2.5+0.5*uBreath;
  float ns3=5.0;

  // Primary flow (large structures)
  vec3 curl1=curlNoise(p*ns1+uTime*0.08)*1.0;
  // Secondary flow (medium tendrils)
  vec3 curl2=curlNoise(p*ns2+uTime*0.18+vec3(50.0))*0.5;
  // Tertiary turbulence (fine detail)
  vec3 curl3=curlNoise(p*ns3+uTime*0.35+vec3(100.0))*0.2;

  // Combine for tendril effect: particles align along flow lines
  vec3 totalCurl=curl1+curl2+curl3;

  // Attraction to center with breathing
  float dist=length(p);
  float attr=0.2+0.5*(1.0-uBreath);
  vec3 toC=-normalize(p+1e-5)*attr*pow(dist,1.2)*0.04;

  // Phase-dependent orbital motion (creates winding tendrils)
  float orbitAngle=phase*6.2832+uTime*0.2;
  vec3 tangent=normalize(cross(p,vec3(sin(orbitAngle),cos(orbitAngle),0.3)));
  vec3 orbital=tangent*0.08*(0.5+0.5*sin(phase*12.566+uTime*0.5));

  // Radial pulsation (breathing)
  vec3 radial=normalize(p+1e-5)*0.03*sin(uTime*0.314+dist*2.0)*uBreath;

  v+=(totalCurl*0.06+toC+orbital+radial);
  v*=0.94; // damping

  float spd=length(v);
  if(spd>1.8)v=v/spd*1.8;

  gl_FragColor=vec4(v,v4.w);
}`;

// ═══════════════════════════════════════════════════════════════
// GPGPU POSITION SHADER
// ═══════════════════════════════════════════════════════════════
const posShader = /* glsl */`
uniform float uBreath;
void main(){
  vec2 uv=gl_FragCoord.xy/resolution.xy;
  vec4 p4=texture2D(texturePosition,uv);
  vec4 v4=texture2D(textureVelocity,uv);
  vec3 p=p4.xyz+v4.xyz*0.008;

  // Soft boundary: breathing-dependent extent
  float mx=2.0+1.0*uBreath;
  float d=length(p);
  if(d>mx) p=p*(mx/d)*0.99+p*0.01; // smooth clamping

  gl_FragColor=vec4(p,p4.w);
}`;

// ═══════════════════════════════════════════════════════════════
// PARTICLE VERTEX SHADER — Tendril colors + white core
// ═══════════════════════════════════════════════════════════════
const ptVert = /* glsl */`
uniform sampler2D tPos;
uniform sampler2D tVel;
uniform float uSize;
uniform float uBreath;
uniform vec2 uResolution;
varying vec3 vCol;
varying float vA;
varying vec2 vVelScreen; // velocity direction in screen space for oriented stretch
varying float vStretch;
void main(){
  vec4 pd=texture2D(tPos,uv);
  vec4 vd=texture2D(tVel,uv);
  vec3 pos=pd.xyz;
  vec3 vel=vd.xyz;
  float spd=length(vel);
  float dist=length(pos);
  float phase=pd.w;

  // === VELOCITY-ORIENTED STRETCHING ===
  // Project velocity endpoint into screen space to get motion direction
  vec4 mvPos=modelViewMatrix*vec4(pos,1.);
  vec4 mvVelEnd=modelViewMatrix*vec4(pos+normalize(vel+1e-6)*0.1,1.);
  vec4 clipPos=projectionMatrix*mvPos;
  vec4 clipVel=projectionMatrix*mvVelEnd;
  vec2 screenPos=clipPos.xy/clipPos.w;
  vec2 screenVelEnd=clipVel.xy/clipVel.w;
  vec2 velDir=screenVelEnd-screenPos;
  // Correct for aspect ratio
  velDir.x*=uResolution.x/uResolution.y;
  float velLen=length(velDir);
  vVelScreen=velLen>0.001?normalize(velDir):vec2(1.0,0.0);
  vStretch=clamp(1.0+spd*3.0,1.0,5.0);

  // === COLOR PALETTE: Neon Magenta, Cyan, Emerald, Gold (per reference) ===
  float t=clamp(spd*3.0,0.,1.);
  vec3 magenta=vec3(.9,.05,.65);
  vec3 cyan=vec3(.05,.82,.92);
  vec3 emerald=vec3(.08,.92,.42);
  vec3 gold=vec3(.95,.65,.08);
  vec3 deepPurple=vec3(.35,.02,.55);

  // Phase-based color variation for strand diversity (4 bands)
  float colorPhase=fract(phase*4.0+spd*2.0);
  vec3 col;
  if(colorPhase<0.25) col=mix(magenta,cyan,t);
  else if(colorPhase<0.50) col=mix(cyan,emerald,t);
  else if(colorPhase<0.75) col=mix(emerald,gold,t);
  else col=mix(gold,magenta,t);

  // Deep purple for slow distant particles
  float slowFar=smoothstep(0.0,0.15,spd)*smoothstep(3.0,1.5,dist);
  col=mix(deepPurple,col,slowFar);

  // WHITE BLOWN-OUT CORE — density-driven, not just radius
  // Density proxy: center particles that are also slow (packed tight) are densest
  float densityProxy = (1.0-smoothstep(0.0,0.8,dist)) * (1.0-smoothstep(0.0,0.3,spd));
  // Also add pure radius component but weighted less
  float radiusCore = 1.0-smoothstep(0.0,0.5,dist);
  float coreFactor = max(pow(densityProxy,1.5)*1.2, pow(radiusCore,3.0)*0.6);
  coreFactor = clamp(coreFactor,0.0,1.0);
  col=mix(col,vec3(1.0),coreFactor*0.95);
  col*=1.0+spd*0.6;

  vCol=col;
  vA=(.12+.88*(1.-smoothstep(0.,2.5,dist)))*(0.25+spd*0.8);
  vA*=(0.8+0.2*uBreath);

  gl_PointSize=uSize*vStretch*(220./-mvPos.z);
  gl_Position=clipPos;
}`;

// ═══════════════════════════════════════════════════════════════
// PARTICLE FRAGMENT SHADER — Soft glow
// ═══════════════════════════════════════════════════════════════
const ptFrag = /* glsl */`
varying vec3 vCol;
varying float vA;
varying vec2 vVelScreen;
varying float vStretch;
void main(){
  vec2 pc=gl_PointCoord-0.5;
  // Rotate point coordinate to align with velocity direction
  float cosA=vVelScreen.x;
  float sinA=vVelScreen.y;
  vec2 rotated=vec2(
    pc.x*cosA+pc.y*sinA,
    -pc.x*sinA+pc.y*cosA
  );
  // Stretch along velocity (rotated X axis)
  rotated.x*=vStretch;
  float d=length(rotated)*2.0;
  // Tight Gaussian for filament look
  float a=exp(-d*d*4.5);
  a*=vA*0.22;
  gl_FragColor=vec4(vCol*a,a);
}`;

// ═══════════════════════════════════════════════════════════════
// GPGPU INITIALIZATION
// ═══════════════════════════════════════════════════════════════
const gpu = new GPUComputationRenderer(TEX, TEX, renderer);
const pTex = gpu.createTexture();
const vTex = gpu.createTexture();
const pd = pTex.image.data, vd = vTex.image.data;

for (let i = 0; i < COUNT; i++) {
  const j = i * 4;
  // Distribute in a sphere with tendril-friendly seeding
  const th = Math.random() * Math.PI * 2;
  const ph = Math.acos(2 * Math.random() - 1);
  // Power distribution: more particles near center
  const r = Math.pow(Math.random(), 0.5) * 1.8;
  pd[j]   = r * Math.sin(ph) * Math.cos(th);
  pd[j+1] = r * Math.sin(ph) * Math.sin(th);
  pd[j+2] = r * Math.cos(ph);
  pd[j+3] = Math.random(); // phase (used for color diversity)
  // Small initial velocity
  vd[j]   = (Math.random() - .5) * .03;
  vd[j+1] = (Math.random() - .5) * .03;
  vd[j+2] = (Math.random() - .5) * .03;
  vd[j+3] = 0;
}

const posV = gpu.addVariable('texturePosition', posShader, pTex);
const velV = gpu.addVariable('textureVelocity', velShader, vTex);
gpu.setVariableDependencies(posV, [posV, velV]);
gpu.setVariableDependencies(velV, [posV, velV]);
const pu = posV.material.uniforms, vu = velV.material.uniforms;
pu.uBreath = { value: 0 };
vu.uTime = { value: 0 };
vu.uBreath = { value: 0 };

const gpuErr = gpu.init();
if (gpuErr) {
  console.error('GPGPU:', gpuErr);
  activateVideoFallback('GPGPU init failed. Please use a modern GPU.');
  throw new Error('GPGPU failed — video fallback: ' + gpuErr);
}

// ═══════════════════════════════════════════════════════════════
// PARTICLE POINTS MESH
// ═══════════════════════════════════════════════════════════════
const geo = new THREE.BufferGeometry();
const uvs = new Float32Array(COUNT * 2);
const pos0 = new Float32Array(COUNT * 3);
for (let i = 0; i < COUNT; i++) {
  uvs[i*2]   = (i % TEX + .5) / TEX;
  uvs[i*2+1] = (Math.floor(i / TEX) + .5) / TEX;
}
geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
geo.setAttribute('position', new THREE.BufferAttribute(pos0, 3));

const mat = new THREE.ShaderMaterial({
  uniforms: { tPos: {value:null}, tVel: {value:null}, uSize: {value:1.0}, uBreath: {value:0}, uResolution: {value: new THREE.Vector2(window.innerWidth, window.innerHeight)} },
  vertexShader: ptVert, fragmentShader: ptFrag,
  blending: THREE.AdditiveBlending, depthWrite: false, transparent: true
});
const pts = new THREE.Points(geo, mat);
pts.frustumCulled = false;
scene.add(pts);

// ═══════════════════════════════════════════════════════════════
// BACKGROUND: Lat/Lon Spherical Grid (dotted lines)
// ═══════════════════════════════════════════════════════════════
// Dashed grid using LineSegments for deliberate dash pattern + shader-based radial fade
const gridDashVertShader = /* glsl */`
varying float vScreenDist;
varying vec3 vWorldPos;
void main() {
  vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
  vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
  gl_Position = projectionMatrix * mvPosition;
  // Screen-space distance from center for radial fade
  vec2 ndc = gl_Position.xy / gl_Position.w;
  vScreenDist = length(ndc);
}
`;
const gridDashFragShader = /* glsl */`
uniform float uOpacity;
uniform vec3 uColor;
varying float vScreenDist;
varying vec3 vWorldPos;
void main() {
  // Radial screen-space fade: dissolve into void at edges
  float edgeFade = 1.0 - smoothstep(0.3, 1.2, vScreenDist);
  float a = uOpacity * edgeFade;
  if (a < 0.005) discard;
  gl_FragColor = vec4(uColor, a);
}
`;

function createLatLonGrid(radius, latCount, lonCount) {
  const group = new THREE.Group();
  const dashLen = 0.18;
  const gapLen = 0.14;
  const color = new THREE.Color(0x556070);

  function makeDashedSegments(points) {
    // Create dash segments from a continuous polyline
    const segs = [];
    let accum = 0;
    let inDash = true;
    for (let i = 0; i < points.length - 1; i++) {
      const a = points[i], b = points[i + 1];
      const segLen = a.distanceTo(b);
      let localStart = 0;
      while (localStart < segLen) {
        const threshold = inDash ? dashLen : gapLen;
        const remaining = threshold - accum;
        const available = segLen - localStart;
        const consume = Math.min(remaining, available);
        if (inDash) {
          const t0 = localStart / segLen;
          const t1 = (localStart + consume) / segLen;
          segs.push(
            a.clone().lerp(b, t0),
            a.clone().lerp(b, t1)
          );
        }
        localStart += consume;
        accum += consume;
        if (accum >= threshold - 0.0001) { accum = 0; inDash = !inDash; }
      }
    }
    return segs;
  }

  const gridMat = new THREE.ShaderMaterial({
    uniforms: {
      uOpacity: { value: 0.1 },
      uColor: { value: color }
    },
    vertexShader: gridDashVertShader,
    fragmentShader: gridDashFragShader,
    transparent: true,
    depthWrite: false,
    blending: THREE.NormalBlending
  });

  // Latitude circles
  for (let i = 1; i < latCount; i++) {
    const phi = (i / latCount) * Math.PI;
    const r = radius * Math.sin(phi);
    const y = radius * Math.cos(phi);
    const pts = [];
    for (let j = 0; j <= 128; j++) {
      const theta = (j / 128) * Math.PI * 2;
      pts.push(new THREE.Vector3(r * Math.cos(theta), y, r * Math.sin(theta)));
    }
    const dashPts = makeDashedSegments(pts);
    if (dashPts.length < 2) continue;
    const g = new THREE.BufferGeometry().setFromPoints(dashPts);
    const line = new THREE.LineSegments(g, gridMat.clone());
    group.add(line);
  }

  // Longitude arcs
  for (let j = 0; j < lonCount; j++) {
    const theta = (j / lonCount) * Math.PI * 2;
    const pts = [];
    for (let i = 0; i <= 80; i++) {
      const phi = (i / 80) * Math.PI;
      pts.push(new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      ));
    }
    const dashPts = makeDashedSegments(pts);
    if (dashPts.length < 2) continue;
    const g = new THREE.BufferGeometry().setFromPoints(dashPts);
    const line = new THREE.LineSegments(g, gridMat.clone());
    group.add(line);
  }

  return group;
}

// Denser grid: 24 lat × 36 lon for immersive data universe feel
const gridGroup = createLatLonGrid(7, 24, 36);
scene.add(gridGroup);

// ═══════════════════════════════════════════════════════════════
// POST PROCESSING: Bloom (strong for white core effect)
// ═══════════════════════════════════════════════════════════════
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  2.5,    // strength — aggressive for blown-out white core
  1.0,    // radius — wider bloom spread
  0.15    // threshold — higher so only bright core particles bloom heavily
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// Radial fade is built into grid dash fragment shader (screen-space NDC distance)

// ═══════════════════════════════════════════════════════════════
// CALLOUT ANCHOR SYSTEM — Real GPGPU texture readback
// ═══════════════════════════════════════════════════════════════
// Sample actual particle positions from the GPGPU position texture.
// We pick "sentinel" texels at fixed UV locations and read their world-space
// positions via readRenderTargetPixels. This gives real sculpture-surface
// anchor points that move with the live simulation — not a proxy sphere.
const sentinelUVs = {
  medium:  { u: 0.15, v: 0.25 },  // upper-left quadrant particle
  res:     { u: 0.85, v: 0.20 },  // upper-right quadrant
  latent:  { u: 0.20, v: 0.75 },  // lower-left quadrant
  density: { u: 0.80, v: 0.70 },  // lower-right quadrant
};
const anchorTargets = {};
for (const k in sentinelUVs) {
  anchorTargets[k] = new THREE.Vector3(0, 0, 0);
}

// Readback buffer — we read 1 pixel per sentinel (4 floats = RGBA = xyz + phase)
const readBuf = new Float32Array(4);

function updateAnchorsFromGPGPU() {
  const rt = gpu.getCurrentRenderTarget(posV);
  for (const [k, uv] of Object.entries(sentinelUVs)) {
    const px = Math.floor(uv.u * TEX);
    const py = Math.floor(uv.v * TEX);
    renderer.readRenderTargetPixels(rt, px, py, 1, 1, readBuf);
    // readBuf = [x, y, z, phase] — actual particle world position
    if (isFinite(readBuf[0]) && isFinite(readBuf[1]) && isFinite(readBuf[2])) {
      // Smooth interpolation for stable, non-jittery callout lines
      anchorTargets[k].lerp(new THREE.Vector3(readBuf[0], readBuf[1], readBuf[2]), 0.12);
    }
  }
}

function proj(v) {
  const p = v.clone().project(camera);
  return { x: (p.x + 1) / 2 * window.innerWidth, y: (-p.y + 1) / 2 * window.innerHeight };
}

function updateCalloutLines() {
  for (const [k, target] of Object.entries(anchorTargets)) {
    const lb = document.getElementById('lb-' + k);
    if (!lb) continue;
    const r = lb.getBoundingClientRect();
    const isLeft = k === 'medium' || k === 'latent';
    const lx = isLeft ? r.right + 6 : r.left - 6;
    const ly = r.top + r.height / 2;
    const s = proj(target);
    const ln = document.getElementById('ln-' + k);
    const dt = document.getElementById('dt-' + k);
    if (ln) { ln.setAttribute('x1', lx); ln.setAttribute('y1', ly); ln.setAttribute('x2', s.x); ln.setAttribute('y2', s.y); }
    if (dt) { dt.setAttribute('cx', s.x); dt.setAttribute('cy', s.y); }
  }
}

// ═══════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
  mat.uniforms.uResolution.value.set(w, h);
  document.getElementById('ui-res').textContent = w + '×' + h;
});

// ═══════════════════════════════════════════════════════════════
// FPS + RUNTIME TIER DOWNGRADE
// ═══════════════════════════════════════════════════════════════
let fc = 0, lt = performance.now();
let lowFpsCount = 0;
const FPS_THRESHOLD = 20; // If FPS stays below 20 for 5 consecutive seconds, show fallback
const LOW_FPS_LIMIT = 5;

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let started = false;

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  if (!started) { started = true; setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400); }

  // 20s breathing cycle with non-linear easing (ease-in-out cubic)
  const cyclePos = (t % CYCLE) / CYCLE;
  const rawBreath = Math.sin(cyclePos * Math.PI * 2) * 0.5 + 0.5;
  const breath = rawBreath < 0.5
    ? 4 * rawBreath * rawBreath * rawBreath
    : 1 - Math.pow(-2 * rawBreath + 2, 3) / 2;

  // GPGPU compute
  vu.uTime.value = t;
  vu.uBreath.value = breath;
  pu.uBreath.value = breath;
  gpu.compute();

  // Update particle textures
  mat.uniforms.tPos.value = gpu.getCurrentRenderTarget(posV).texture;
  mat.uniforms.tVel.value = gpu.getCurrentRenderTarget(velV).texture;
  mat.uniforms.uBreath.value = breath;

  // Mouse parallax
  mouse.x += (mouse.tx - mouse.x) * 0.04;
  mouse.y += (mouse.ty - mouse.y) * 0.04;
  camera.position.x = -mouse.x * 0.35;
  camera.position.y = -mouse.y * 0.25;
  camera.lookAt(0, 0, 0);

  // Grid slow rotation
  gridGroup.rotation.y = t * 0.015;
  gridGroup.rotation.x = Math.sin(t * 0.008) * 0.08;
  // Grid opacity pulsation with breathing
  gridGroup.traverse(child => {
    if (child.material && child.material.uniforms && child.material.uniforms.uOpacity) {
      child.material.uniforms.uOpacity.value = 0.07 + 0.06 * breath;
    }
  });

  // Update anchors from real GPGPU particle positions (every 3 frames for perf)
  if (fc % 3 === 0) updateAnchorsFromGPGPU();

  // Render
  composer.render();
  updateCalloutLines();

  // FPS display + runtime performance-based downgrade
  fc++;
  const now = performance.now();
  if (now - lt >= 1000) {
    const fps = fc;
    document.getElementById('ui-fps').textContent = fps;
    document.getElementById('ui-density').textContent = (COUNT * fps / 1e6).toFixed(1) + 'M/s';
    // Runtime tier downgrade: if FPS < threshold for sustained period, switch to video
    if (fps < FPS_THRESHOLD && started) {
      lowFpsCount++;
      if (lowFpsCount >= LOW_FPS_LIMIT) {
        console.warn('Sustained low FPS (' + fps + '), switching to video fallback');
        activateVideoFallback('Performance too low (' + fps + ' FPS).<br>Showing pre-rendered visualization.');
        return; // stop animation loop
      }
    } else {
      lowFpsCount = 0;
    }
    fc = 0; lt = now;
  }
}
tick();
</script>
</body>
</html>
